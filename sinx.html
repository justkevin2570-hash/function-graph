<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Sine Wave Generation Motion</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f2f5; font-family: sans-serif; }
        canvas { background-color: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
        .back-btn { position: absolute; top: 20px; right: 20px; padding: 7px 16px; background: rgba(255,255,255,0.85); border: none; border-radius: 8px; font-size: 13px; cursor: pointer; color: #333; text-decoration: none; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
        .controls-row { display: flex; gap: 10px; align-items: center; }
        .btn { padding: 8px 16px; border: 2px solid #1e90ff; background: white; color: #1e90ff; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: sans-serif; }
        .btn.active { background: #1e90ff; color: white; }
        .speed-label { font-size: 13px; color: #555; margin-right: 2px; }
        .btn-speed { padding: 6px 14px; border: 2px solid #888; background: white; color: #555; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: sans-serif; }
        .btn-speed.active { background: #555; color: white; }
        .btn-amp { padding: 6px 13px; border: 2px solid #27ae60; background: white; color: #27ae60; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: sans-serif; }
        .btn-amp.active { background: #27ae60; color: white; }
    </style>
</head>
<body>

<a class="back-btn" href="index.html">← 메인으로</a>
<div class="controls">
    <div class="controls-row">
        <button class="btn active"  id="btn2pi"    onclick="setMode('2pi')">y = sin x &nbsp;(0 &lt; x &lt; 2π)</button>
        <button class="btn"         id="btn6pi"    onclick="setMode('6pi')">y = sin x &nbsp;(0 &lt; x &lt; 6π)</button>
        <button class="btn"         id="btnneg4pi" onclick="setMode('neg4pi')">y = sin x &nbsp;(-4π &lt; x &lt; 4π)</button>
    </div>
    <div class="controls-row">
        <span class="speed-label">계수:</span>
        <button class="btn-amp"        id="amp-half" onclick="setAmplitude(0.5)">½</button>
        <button class="btn-amp active" id="amp-1"    onclick="setAmplitude(1)">1</button>
        <button class="btn-amp"        id="amp-2"    onclick="setAmplitude(2)">2</button>
        <button class="btn-amp"        id="amp-3"    onclick="setAmplitude(3)">3</button>
    </div>
    <div class="controls-row">
        <span class="speed-label">속도:</span>
        <button class="btn-speed active" id="btn1x" onclick="setSpeed(1)">1배속</button>
        <button class="btn-speed"        id="btn2x" onclick="setSpeed(2)">2배속</button>
    </div>
</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let mode = '2pi';
let amplitude = 1;
let angle = 0;
let points = [];
let paused = true;
let animId = null;
let speedMultiplier = 1;
let waiting = false;
let waitTimeout = null;
let isDragging = false;

// ── 마우스 유틸 ───────────────────────────────────────────
function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: (e.clientX - rect.left) * (canvas.width  / rect.width),
        y: (e.clientY - rect.top)  * (canvas.height / rect.height)
    };
}
function isNearCircle(pos, cfg) {
    const { circleCenter, radius } = cfg;
    const dx = pos.x - circleCenter.x, dy = pos.y - circleCenter.y;
    return Math.sqrt(dx*dx + dy*dy) <= radius + 24;
}
function setAngleFromMouse(pos, cfg) {
    const { circleCenter, startAngle, endAngle } = cfg;
    const dx = pos.x - circleCenter.x, dy = pos.y - circleCenter.y;
    let raw = -Math.atan2(dy, dx);
    const k = Math.round((angle - raw) / (Math.PI * 2));
    let a = raw + k * Math.PI * 2;
    a = Math.max(startAngle, Math.min(endAngle, a));
    angle = a;
    points = buildPoints(cfg, angle);
}
function buildPoints(cfg, toAngle) {
    const { radius, circleCenter, graphOrigin, startAngle } = cfg;
    const amp = amplitude;
    const pts = [];
    const step = 0.02;
    for (let a = startAngle; a <= toAngle + 1e-9; a += step) {
        const a2 = Math.min(a, toAngle);
        const py_a = circleCenter.y + radius * Math.sin(-a2);
        pts.push({
            x: graphOrigin.x + (a2 - startAngle) * radius,
            y: graphOrigin.y + amp * (py_a - circleCenter.y)
        });
    }
    return pts;
}

canvas.addEventListener('mousedown', (e) => {
    const pos = getCanvasPos(e);
    if (isNearCircle(pos, getConfig())) {
        isDragging = true;
        if (waitTimeout) { clearTimeout(waitTimeout); waitTimeout = null; }
        waiting = false;
        paused = true;
        setAngleFromMouse(pos, getConfig());
        draw();
    }
});
canvas.addEventListener('mousemove', (e) => {
    const pos = getCanvasPos(e);
    canvas.style.cursor = isNearCircle(pos, getConfig()) ? 'grab' : 'default';
    if (!isDragging) return;
    canvas.style.cursor = 'grabbing';
    setAngleFromMouse(pos, getConfig());
    draw();
});
canvas.addEventListener('mouseup', (e) => {
    if (!isDragging) {
        paused = !paused;
        if (!paused) draw();
    }
    isDragging = false;
});
canvas.addEventListener('mouseleave', () => {
    isDragging = false;
    canvas.style.cursor = 'default';
});

// ── 설정 ──────────────────────────────────────────────────
function getConfig() {
    if (mode === '2pi') {
        const radius = 115;
        const graphAmpPx = amplitude * radius;
        const canvasHeight = Math.max(640, Math.ceil(graphAmpPx * 2 + 100));
        const cy = canvasHeight / 2;
        return {
            canvasWidth: 1400, canvasHeight,
            radius,
            circleCenter: { x: 240, y: cy },
            graphOrigin:  { x: 530, y: cy },
            startAngle: 0,
            endAngle:   Math.PI * 2,
            speed: 0.02
        };
    } else if (mode === '6pi') {
        const radius = 65;
        const graphAmpPx = amplitude * radius;
        const graphOriginY = 520;
        const canvasHeight = Math.max(700, graphOriginY + graphAmpPx + 50);
        return {
            canvasWidth: 1400, canvasHeight,
            radius,
            circleCenter: { x: 700, y: 165 },
            graphOrigin:  { x: 60,  y: graphOriginY },
            startAngle: 0,
            endAngle:   Math.PI * 6,
            speed: 0.02
        };
    } else {
        // neg4pi: -4π < x < 4π
        const radius = 50;
        const graphAmpPx = amplitude * radius;
        const graphOriginX = 60;
        const graphOriginY = 520;
        const circleX = Math.round(graphOriginX + 4 * Math.PI * radius);
        const canvasHeight = Math.max(700, graphOriginY + graphAmpPx + 50);
        return {
            canvasWidth: 1400, canvasHeight,
            radius,
            circleCenter: { x: circleX, y: 165 },
            graphOrigin:  { x: graphOriginX, y: graphOriginY },
            startAngle: -Math.PI * 4,
            endAngle:    Math.PI * 4,
            speed: 0.02
        };
    }
}

function setSpeed(mult) {
    speedMultiplier = mult;
    document.getElementById('btn1x').classList.toggle('active', mult === 1);
    document.getElementById('btn2x').classList.toggle('active', mult === 2);
}

function setMode(m) {
    mode = m;
    const cfg = getConfig();
    angle = cfg.startAngle;
    points = [];
    paused = true;
    waiting = false;
    if (waitTimeout) { clearTimeout(waitTimeout); waitTimeout = null; }
    document.getElementById('btn2pi').classList.toggle('active',    m === '2pi');
    document.getElementById('btn6pi').classList.toggle('active',    m === '6pi');
    document.getElementById('btnneg4pi').classList.toggle('active', m === 'neg4pi');
    canvas.width  = cfg.canvasWidth;
    canvas.height = cfg.canvasHeight;
    if (animId) cancelAnimationFrame(animId);
    draw();
}

function setAmplitude(amp) {
    amplitude = amp;
    document.getElementById('amp-half').classList.toggle('active', amp === 0.5);
    document.getElementById('amp-1').classList.toggle('active',    amp === 1);
    document.getElementById('amp-2').classList.toggle('active',    amp === 2);
    document.getElementById('amp-3').classList.toggle('active',    amp === 3);
    const cfg = getConfig();
    angle = cfg.startAngle;
    points = [];
    paused = true;
    waiting = false;
    if (waitTimeout) { clearTimeout(waitTimeout); waitTimeout = null; }
    canvas.width  = cfg.canvasWidth;
    canvas.height = cfg.canvasHeight;
    if (animId) cancelAnimationFrame(animId);
    draw();
}

// ── 축 그리기 ─────────────────────────────────────────────
function drawAxes(cfg) {
    const { radius, circleCenter, graphOrigin, startAngle, endAngle } = cfg;
    const graphWidth = (endAngle - startAngle) * radius;
    const graphAmpPx = amplitude * radius;
    const zeroX = graphOrigin.x + (0 - startAngle) * radius;

    // 원 중심축
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(circleCenter.x - radius - 20, circleCenter.y);
    ctx.lineTo(circleCenter.x + radius + 20, circleCenter.y);
    ctx.moveTo(circleCenter.x, circleCenter.y - radius - 20);
    ctx.lineTo(circleCenter.x, circleCenter.y + radius + 20);
    ctx.stroke();

    // 그래프 x축 & y축
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(graphOrigin.x - 10,              graphOrigin.y);
    ctx.lineTo(graphOrigin.x + graphWidth + 30, graphOrigin.y);
    ctx.moveTo(zeroX, graphOrigin.y - graphAmpPx - 20);
    ctx.lineTo(zeroX, graphOrigin.y + graphAmpPx + 20);
    ctx.stroke();

    // y=±amplitude 점선
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = 'rgba(150, 150, 150, 0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(graphOrigin.x, graphOrigin.y - graphAmpPx);
    ctx.lineTo(graphOrigin.x + graphWidth + 30, graphOrigin.y - graphAmpPx);
    ctx.moveTo(graphOrigin.x, graphOrigin.y + graphAmpPx);
    ctx.lineTo(graphOrigin.x + graphWidth + 30, graphOrigin.y + graphAmpPx);
    ctx.stroke();
    ctx.setLineDash([]);

    // y축 레이블
    const ampLabel = amplitude === 0.5 ? '½' : String(amplitude);
    ctx.fillStyle = '#333';
    ctx.font = '26px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(ampLabel,        zeroX - 10, graphOrigin.y - graphAmpPx + 8);
    ctx.fillText('-' + ampLabel,  zeroX - 10, graphOrigin.y + graphAmpPx + 8);
    if (startAngle === 0) {
        ctx.fillText('0', zeroX - 10, graphOrigin.y + 34);
    }

    // 단위원 레이블
    ctx.textAlign = 'left';
    ctx.fillText('1',  circleCenter.x + radius + 6, circleCenter.y + 9);
    ctx.textAlign = 'right';
    ctx.fillText('-1', circleCenter.x - radius - 4, circleCenter.y + 9);
    ctx.fillText('1',  circleCenter.x - 6, circleCenter.y - radius + 9);
    ctx.fillText('-1', circleCenter.x - 6, circleCenter.y + radius + 9);

    // x축 눈금 & 레이블
    const totalPiSteps = Math.round((endAngle - startAngle) / Math.PI);
    const firstStep = startAngle < 0 ? 0 : 1;
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    for (let i = firstStep; i <= totalPiSteps; i++) {
        const a      = startAngle + i * Math.PI;
        const xMark  = graphOrigin.x + i * Math.PI * radius;
        const piCount = Math.round(a / Math.PI);

        ctx.beginPath();
        ctx.moveTo(xMark, graphOrigin.y - 6);
        ctx.lineTo(xMark, graphOrigin.y + 6);
        ctx.stroke();

        let label;
        if      (piCount === 0)  label = '0';
        else if (piCount === 1)  label = 'π';
        else if (piCount === -1) label = '-π';
        else                     label = piCount + 'π';

        ctx.textAlign = 'center';
        ctx.fillStyle = '#333';
        ctx.fillText(label, xMark, graphOrigin.y + 34);
    }
}

// ── 일시정지 힌트 ─────────────────────────────────────────
function drawPauseHint() {
    if (!paused || isDragging) return;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('▶  클릭하여 시작', canvas.width / 2, canvas.height - 24);
    ctx.restore();
}

// ── 메인 드로우 ───────────────────────────────────────────
function draw() {
    const cfg = getConfig();
    const { radius, circleCenter, graphOrigin, startAngle, endAngle, speed } = cfg;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawAxes(cfg);

    // 단위원
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(circleCenter.x, circleCenter.y, radius, 0, Math.PI * 2);
    ctx.stroke();

    // 회전점 계산
    const px = circleCenter.x + radius * Math.cos(-angle);
    const py = circleCenter.y + radius * Math.sin(-angle);

    // 반지름 선
    ctx.strokeStyle = '#ff4757';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(circleCenter.x, circleCenter.y);
    ctx.lineTo(px, py);
    ctx.stroke();

    // 원 위의 점
    ctx.fillStyle = '#ff4757';
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fill();

    const gx = graphOrigin.x + (angle - startAngle) * radius;
    const gy = graphOrigin.y + amplitude * (py - circleCenter.y);

    points.push({ x: gx, y: gy });

    // 연결선
    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = 'rgba(255, 71, 87, 0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(gx, gy);
    ctx.stroke();
    ctx.setLineDash([]);

    // 사인 곡선
    ctx.strokeStyle = '#1e90ff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    points.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
    });
    ctx.stroke();

    // 펼쳐지는 선 (x=0 기준)
    const zeroX = graphOrigin.x + (0 - startAngle) * radius;
    ctx.strokeStyle = '#2ed573';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(zeroX, graphOrigin.y + 2);
    ctx.lineTo(gx,    graphOrigin.y + 2);
    ctx.stroke();

    // 그래프 위의 현재 점
    ctx.fillStyle = '#ff4757';
    ctx.beginPath();
    ctx.arc(gx, gy, 5, 0, Math.PI * 2);
    ctx.fill();

    drawPauseHint();

    if (!isDragging && !paused) {
        if (!waiting) angle += speed * speedMultiplier;
        if (angle > endAngle && !waiting) {
            waiting = true;
            angle = endAngle;
            waitTimeout = setTimeout(() => {
                angle = startAngle;
                points = [];
                waiting = false;
                waitTimeout = null;
            }, 1000);
        }
        animId = requestAnimationFrame(draw);
    }
}

// ── 초기화 ────────────────────────────────────────────────
const initCfg = getConfig();
canvas.width  = initCfg.canvasWidth;
canvas.height = initCfg.canvasHeight;
draw();
</script>
</body>
</html>
